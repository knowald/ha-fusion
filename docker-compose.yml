services:
  ha-fusion:
    container_name: ha-fusion
    image: ghcr.io/knowald/ha-fusion
    volumes:
      # Mount data directory for persistent dashboard configurations
      # Update this path to your desired data directory
      - ${DATA_PATH:-./data}:/app/data
    networks:
      - ha-fusion-network
    ports:
      - "${EXPOSED_PORT:-5050}:5050"
    environment:
      TZ: ${TZ:-UTC}
      HASS_URL: ${HASS_URL}
      PORT: 5050
      NODE_ENV: production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ha-fusion-network:
    driver: bridge
